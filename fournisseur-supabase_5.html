<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AccèsPro — Vérification</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#0F1F3D;--gold:#D4A843;--bg:#F2F4F8;--white:#fff;--green:#0CAF60;--green-bg:#EDFBF3;--red:#E53935;--red-bg:#FFF0F0;--muted:#7B8BAD;--border:#E4E8F0;--shadow:0 2px 20px rgba(15,31,61,0.10)}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.safe-top{height:env(safe-area-inset-top,44px);background:var(--navy)}
.safe-bot{height:env(safe-area-inset-bottom,20px)}
.hdr{background:var(--navy);padding:10px 20px 14px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:17px;font-weight:800;color:#fff}.logo em{color:var(--gold);font-style:normal}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.hdr-right{text-align:right}
.hdr-nego{font-size:12px;font-weight:700;color:var(--gold)}
.hdr-clock{font-size:10px;color:rgba(255,255,255,0.4);font-family:monospace;margin-top:2px}
.screen{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.hidden{display:none!important}

/* SCAN CARD */
.scan-card{background:var(--white);border-radius:18px;padding:20px;box-shadow:var(--shadow);text-align:center}
.scan-icon{font-size:48px;margin-bottom:12px}
.scan-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:6px}
.scan-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:16px}

/* BOUTON SCAN NATIF IPHONE */
.btn-scan-wrap{position:relative;width:100%}
.btn-scan{width:100%;padding:16px;background:var(--navy);color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-scan:active{opacity:0.82}
#qrFileInput{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* CAMÉRA EN DIRECT (fallback desktop) */
.cam-section{margin-top:12px}
.cam-wrap{position:relative;width:100%;height:220px;background:#000;border-radius:12px;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover;display:block}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.cam-frame{width:55%;height:70%;border:3px solid var(--gold);border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{border-color:var(--gold)}50%{border-color:rgba(212,168,67,0.3)}}
.scan-line{position:absolute;width:55%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:sl 2s ease-in-out infinite}
@keyframes sl{0%{top:15%}100%{top:85%}}
#canvas{display:none}
.btn-cam-live{width:100%;padding:12px;background:rgba(15,31,61,0.08);color:var(--navy);border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}

.manual-card{background:var(--white);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.box-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.row{display:flex;gap:8px}
.mi{flex:1;padding:13px;border:2px solid var(--border);border-radius:12px;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;font-family:monospace;color:var(--navy);-webkit-appearance:none}
.mi:focus{outline:none;border-color:var(--gold)}
.bv{padding:13px 16px;background:var(--gold);color:var(--navy);border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer}

/* RÉSULTAT */
.verdict{border-radius:20px;padding:24px 20px;text-align:center}
.verdict.ok{background:var(--green-bg);border:2.5px solid var(--green)}
.verdict.ko{background:var(--red-bg);border:2.5px solid var(--red)}
.v-icon{font-size:56px;margin-bottom:8px;line-height:1}
.v-text{font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
.ok .v-text{color:var(--green)}.ko .v-text{color:var(--red)}
.v-sub{font-size:13px;color:var(--muted);font-weight:500}
.detail{background:var(--white);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.d-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:9px}
.d-name{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:3px}
.d-sub{font-size:13px;color:var(--muted);margin-bottom:3px}
.d-code{font-family:monospace;font-size:11px;color:var(--muted);letter-spacing:1.5px}
.d-badge{display:inline-block;background:#EEF2FF;color:var(--navy);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:7px;text-transform:uppercase}
.ch-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--navy)}
.ch-row:last-child{border-bottom:none}
.ch-dot{width:7px;height:7px;background:var(--green);border-radius:50%;flex-shrink:0}
.saved-card{background:var(--navy);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px}
.saved-text{font-size:12px;color:rgba(255,255,255,0.7);line-height:1.4}
.saved-text strong{color:#34D399}
.btn-retry{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer}
.ts{text-align:center;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="safe-top"></div>
<div class="hdr">
  <div><div class="logo">Accès<em>Pro</em></div><div class="logo-sub">Comptoir</div></div>
  <div class="hdr-right">
    <div class="hdr-nego" id="hdrNego">—</div>
    <div class="hdr-clock" id="hdrClock">--:--:--</div>
  </div>
</div>

<div class="screen" id="sWait">
  <!-- SCAN NATIF IPHONE -->
  <div class="scan-card">
    <div class="scan-icon">📷</div>
    <div class="scan-title">Scanner le QR du salarié</div>
    <div class="scan-sub">Appuyez sur le bouton ci-dessous — votre appareil photo s'ouvre directement</div>
    <div class="btn-scan-wrap">
      <button class="btn-scan">📷 Ouvrir l'appareil photo</button>
      <input type="file" id="qrFileInput" accept="image/*" capture="environment">
    </div>
    <!-- Caméra live (desktop/Android) -->
    <div class="cam-section" id="camSection" style="display:none">
      <div class="cam-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-overlay"><div class="cam-frame"></div><div class="scan-line"></div></div>
        <canvas id="canvas"></canvas>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;text-align:center" id="camSt">Pointez vers le QR code</div>
    </div>
    <button class="btn-cam-live" onclick="toggleLiveCam()">📹 Activer caméra en direct (tablette/PC)</button>
  </div>

  <div class="manual-card">
    <div class="box-lbl">📝 Ou saisir le code manuellement</div>
    <div class="row">
      <input class="mi" id="mi" type="text" placeholder="MAG-XXXXXX" maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')verifyManual()">
      <button class="bv" onclick="verifyManual()">OK</button>
    </div>
  </div>
</div>

<div class="screen hidden" id="sResult">
  <div class="verdict" id="verdict">
    <div class="v-icon" id="vIcon">✅</div>
    <div class="v-text" id="vText">AUTORISÉ</div>
    <div class="v-sub" id="vSub"></div>
  </div>
  <div class="detail">
    <div class="d-lbl">Identité</div>
    <div class="d-name" id="dName">—</div>
    <div class="d-sub" id="dSub">—</div>
    <div class="d-code" id="dCode">—</div>
    <div class="d-badge" id="dBadge">—</div>
  </div>
  <div class="detail">
    <div class="d-lbl">🏗️ Chantiers autorisés</div>
    <div id="dCh">—</div>
  </div>
  <div class="saved-card">
    <div style="font-size:18px">✅</div>
    <div class="saved-text">Passage enregistré dans Supabase<br><strong id="savedInfo">—</strong></div>
  </div>
  <button class="btn-retry" onclick="reset()">← Vérifier un autre salarié</button>
  <div class="ts" id="ts"></div>
</div>
<div class="safe-bot"></div>

<script>
var SUPABASE_URL = "https://rzveghiwbjafmfhrfscb.supabase.co";
var SUPABASE_KEY = "sb_publishable_Hb6ILSc7bzW_sC6ZD2X7Nw_QP5homkU";
var DEMO = {
  "MAG-384729":{nom:"EL MRABET Ahmed",poste:"Gérant",type:"INTERNE",statut:"ACTIF",chantiers:["NOZ Brioude","Patriarca","Carter Cash Angoulins","Stow Your Bags"]},
  "MAG-582341":{nom:"DUPONT Vincent",poste:"Chef de chantier",type:"INTERNE",statut:"ACTIF",chantiers:["Carter Cash Angoulins","Stow Your Bags"]},
  "EXT-114872":{nom:"MARTIN Paul",poste:"Sous-traitant",type:"EXT",statut:"ACTIF",chantiers:["Stow Your Bags"]},
  "EXT-203541":{nom:"GARCIA Luis",poste:"Sous-traitant",type:"EXT",statut:"INACTIF",chantiers:[]}
};

var params = new URLSearchParams(window.location.search);
var NEGO = decodeURIComponent(params.get("nego") || "Fournisseur");

window.onload = function() {
  document.getElementById("hdrNego").textContent = NEGO;
  setInterval(function(){
    var t = new Date();
    document.getElementById("hdrClock").textContent =
      String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0")+":"+String(t.getSeconds()).padStart(2,"0");
  }, 1000);
  var code = params.get("v") || params.get("code");
  if (code) showResult(code.toUpperCase());

  // Scan via photo iPhone
  document.getElementById("qrFileInput").addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var img = new Image();
    var reader = new FileReader();
    reader.onload = function(ev) {
      img.onload = function() {
        var c = document.createElement("canvas");
        c.width = img.width; c.height = img.height;
        var ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0);
        var data = ctx.getImageData(0, 0, c.width, c.height);
        var qr = jsQR(data.data, data.width, data.height);
        if (qr) {
          try {
            var url = new URL(qr.data);
            var code = url.searchParams.get("v");
            if (code) { showResult(code.toUpperCase()); return; }
          } catch(e2) {}
          showResult(qr.data.trim().toUpperCase());
        } else {
          alert("QR code non détecté — réessayez avec une photo plus nette");
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
};

async function fetchSalarie(code) {
  try {
    var res = await fetch(SUPABASE_URL + "/rest/v1/salaries?code=eq." + encodeURIComponent(code) + "&select=*", {
      headers: {"apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY}
    });
    var data = await res.json();
    if (data && data.length > 0) return data[0];
  } catch(e) {}
  return DEMO[code] ? Object.assign({code: code}, DEMO[code]) : null;
}

async function logPassage(code, user, ok) {
  try {
    await fetch(SUPABASE_URL + "/rest/v1/passages", {
      method: "POST",
      headers: {"apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Content-Type": "application/json", "Prefer": "return=minimal"},
      body: JSON.stringify({code_salarie: code, nom_salarie: user ? user.nom : "INCONNU", agence: NEGO, resultat: ok ? "AUTORISE" : "REFUSE", chantiers: user ? user.chantiers : []})
    });
  } catch(e) {}
}

async function showResult(code) {
  var user = await fetchSalarie(code);
  var ok = user && user.statut === "ACTIF" && user.chantiers && user.chantiers.length > 0;
  await logPassage(code, user, ok);
  document.getElementById("verdict").className = "verdict " + (ok ? "ok" : "ko");
  document.getElementById("vIcon").textContent = ok ? "✅" : "🚫";
  document.getElementById("vText").textContent = ok ? "AUTORISÉ" : "REFUSÉ";
  document.getElementById("vSub").textContent = ok ? "Salarié autorisé à passer commande" : (!user ? "Code non reconnu" : user.statut === "INACTIF" ? "Compte inactif" : "Aucun chantier autorisé");
  document.getElementById("dName").textContent = user ? user.nom : "Inconnu";
  document.getElementById("dSub").textContent = user ? user.poste : "—";
  document.getElementById("dCode").textContent = code;
  document.getElementById("dBadge").textContent = user ? (user.type === "INTERNE" ? "Salarié interne" : "Sous-traitant") : "Non référencé";
  var ch = document.getElementById("dCh");
  ch.innerHTML = user && user.chantiers && user.chantiers.length > 0
    ? user.chantiers.map(function(c){return '<div class="ch-row"><div class="ch-dot"></div>'+c+'</div>';}).join("")
    : '<div style="font-size:13px;color:var(--red)">Aucun chantier autorisé</div>';
  document.getElementById("savedInfo").textContent = NEGO + " · " + code;
  var now = new Date();
  document.getElementById("ts").textContent = "Vérifié le " + now.toLocaleDateString("fr-FR") + " à " + now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("sWait").classList.add("hidden");
  document.getElementById("sResult").classList.remove("hidden");
}

function verifyManual() {
  var code = document.getElementById("mi").value.trim().toUpperCase();
  if (code) showResult(code);
}

// Caméra live pour tablette/PC
var scanning = false, stream = null, raf = null;
function toggleLiveCam() {
  var sec = document.getElementById("camSection");
  if (sec.style.display === "none") {
    sec.style.display = "block";
    startLiveCam();
  } else {
    sec.style.display = "none";
    stopCam();
  }
}
async function startLiveCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    document.getElementById("video").srcObject = stream;
    await document.getElementById("video").play();
    scanning = true;
    scanLoop();
  } catch(e) { document.getElementById("camSt").textContent = "❌ Caméra indisponible"; }
}
function scanLoop() {
  if (!scanning) return;
  var v = document.getElementById("video"), c = document.getElementById("canvas");
  if (v.readyState === v.HAVE_ENOUGH_DATA) {
    c.width = v.videoWidth; c.height = v.videoHeight;
    var ctx = c.getContext("2d"); ctx.drawImage(v,0,0);
    var img = ctx.getImageData(0,0,c.width,c.height);
    var qr = jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
    if (qr) {
      scanning = false; stopCam();
      try { var url = new URL(qr.data); var code = url.searchParams.get("v"); if(code){showResult(code.toUpperCase());return;} } catch(e) {}
      showResult(qr.data.trim().toUpperCase());
      return;
    }
  }
  raf = requestAnimationFrame(scanLoop);
}
function stopCam() {
  scanning = false;
  if (raf) cancelAnimationFrame(raf);
  if (stream) stream.getTracks().forEach(function(t){t.stop();});
}
function reset() {
  stopCam();
  document.getElementById("mi").value = "";
  document.getElementById("sResult").classList.add("hidden");
  document.getElementById("sWait").classList.remove("hidden");
  document.getElementById("camSection").style.display = "none";
  history.pushState({},"",location.pathname + "?nego=" + encodeURIComponent(NEGO));
}
</script>
</body>
</html>
