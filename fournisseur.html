<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MAGENCIA — Vérification</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#1B2A4A;--gold:#C9A84C;--bg:#F0F2F7;--white:#fff;--green:#10B981;--green-bg:#ECFDF5;--red:#EF4444;--red-bg:#FEF2F2;--muted:#8896B0}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.safe-top{height:env(safe-area-inset-top,44px);background:var(--navy)}
.hdr{background:var(--navy);padding:12px 20px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:900;color:#fff}.logo em{color:var(--gold);font-style:normal}
.hdr-sub{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.5px}
.screen{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px}
.hidden{display:none!important}
.wait-card{background:var(--white);border-radius:20px;padding:24px;box-shadow:0 2px 16px rgba(27,42,74,0.10);text-align:center}
.wait-icon{font-size:48px;margin-bottom:12px}
.wait-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:6px}
.wait-sub{font-size:14px;color:var(--muted);line-height:1.5}
.manual-card{background:var(--white);border-radius:20px;padding:18px;box-shadow:0 2px 16px rgba(27,42,74,0.10)}
.manual-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.manual-row{display:flex;gap:10px}
.mi{flex:1;padding:14px;border:2px solid #DDE3EF;border-radius:12px;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;font-family:monospace;color:var(--navy);-webkit-appearance:none}
.mi:focus{outline:none;border-color:var(--gold)}
.bv{padding:14px 18px;background:var(--gold);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.result-hero{border-radius:22px;padding:32px 20px;text-align:center}
.result-hero.ok{background:var(--green-bg);border:3px solid var(--green)}
.result-hero.ko{background:var(--red-bg);border:3px solid var(--red)}
.ri{font-size:64px;margin-bottom:10px;line-height:1}
.rv{font-size:38px;font-weight:900;letter-spacing:-1px;margin-bottom:6px}
.ok .rv{color:var(--green)}.ko .rv{color:var(--red)}
.rs{font-size:14px;color:var(--muted);font-weight:500}
.info-card{background:var(--white);border-radius:20px;padding:18px;box-shadow:0 2px 16px rgba(27,42,74,0.10)}
.il{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.in{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:4px}
.ip{font-size:14px;color:var(--muted);margin-bottom:4px}
.ic{font-family:monospace;font-size:12px;color:var(--muted);letter-spacing:1px}
.ib{display:inline-block;background:#EEF2FF;color:var(--navy);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-top:8px;text-transform:uppercase}
.ch-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F1F5F9;font-size:14px;font-weight:600;color:var(--navy)}
.ch-item:last-child{border-bottom:none}
.ch-dot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0}
.btn-retry{width:100%;padding:16px;background:var(--navy);color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer}
.rts{text-align:center;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="safe-top"></div>
<div class="hdr">
  <div class="logo">MAG<em>ENCIA</em></div>
  <div class="hdr-sub">Fournisseur</div>
</div>
<div class="screen" id="sWait">
  <div class="wait-card">
    <div class="wait-icon">🏪</div>
    <div class="wait-title">Vérification salarié</div>
    <div class="wait-sub">Scannez le QR code du salarié avec l'appareil photo iPhone, ou saisissez son code ci-dessous</div>
  </div>
  <div class="manual-card">
    <div class="manual-lbl">📝 Saisie manuelle du code</div>
    <div class="manual-row">
      <input class="mi" id="mi" type="text" placeholder="MAG-XXXXXX" maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')verifyManual()">
      <button class="bv" onclick="verifyManual()">OK</button>
    </div>
  </div>
</div>
<div class="screen hidden" id="sResult">
  <div class="result-hero" id="rHero">
    <div class="ri" id="rIcon">✅</div>
    <div class="rv" id="rVerdict">AUTORISÉ</div>
    <div class="rs" id="rSub"></div>
  </div>
  <div class="info-card">
    <div class="il">Identité</div>
    <div class="in" id="rName">—</div>
    <div class="ip" id="rPoste">—</div>
    <div class="ic" id="rCode">—</div>
    <div class="ib" id="rBadge">—</div>
  </div>
  <div class="info-card">
    <div class="il">🏗️ Chantiers autorisés</div>
    <div id="rCh">—</div>
  </div>
  <button class="btn-retry" onclick="reset()">← Vérifier un autre salarié</button>
  <div class="rts" id="rTs"></div>
</div>
<script>
var U=[
  {c:"MAG-384729",n:"EL MRABET Ahmed",p:"Gérant",t:"INTERNE",s:"ACTIF",ch:["NOZ Brioude","Patriarca","Carter Cash Angoulins","Stow Your Bags"]},
  {c:"MAG-582341",n:"DUPONT Vincent",p:"Chef de chantier",t:"INTERNE",s:"ACTIF",ch:["Carter Cash Angoulins","Stow Your Bags"]},
  {c:"EXT-114872",n:"MARTIN Paul",p:"Sous-traitant",t:"EXT",s:"ACTIF",ch:["Stow Your Bags"]},
  {c:"EXT-203541",n:"GARCIA Luis",p:"Sous-traitant",t:"EXT",s:"INACTIF",ch:[]}
];
window.onload=function(){
  var p=new URLSearchParams(window.location.search);
  var code=p.get("v")||p.get("code");
  if(code)showResult(code.toUpperCase());
};
function verifyManual(){
  var code=document.getElementById("mi").value.trim().toUpperCase();
  if(code)showResult(code);
}
function showResult(code){
  var u=U.find(function(x){return x.c===code;});
  var ok=u&&u.s==="ACTIF"&&u.ch&&u.ch.length>0;
  document.getElementById("rHero").className="result-hero "+(ok?"ok":"ko");
  document.getElementById("rIcon").textContent=ok?"✅":"🚫";
  document.getElementById("rVerdict").textContent=ok?"AUTORISÉ":"REFUSÉ";
  document.getElementById("rSub").textContent=ok?"Ce salarié est autorisé à passer commande":(!u?"Code non reconnu":u.s==="INACTIF"?"Compte inactif — contacter MAGENCIA":"Aucun chantier autorisé");
  document.getElementById("rName").textContent=u?u.n:"Inconnu";
  document.getElementById("rPoste").textContent=u?u.p:"—";
  document.getElementById("rCode").textContent=code;
  document.getElementById("rBadge").textContent=u?(u.t==="INTERNE"?"Salarié MAGENCIA":"Sous-traitant"):"Non référencé";
  var ch=document.getElementById("rCh");
  ch.innerHTML=u&&u.ch&&u.ch.length>0?u.ch.map(function(c){return'<div class="ch-item"><div class="ch-dot"></div>'+c+'</div>';}).join(''):'<div style="font-size:13px;color:var(--red)">Aucun chantier autorisé</div>';
  var now=new Date();
  document.getElementById("rTs").textContent="Vérifié le "+now.toLocaleDateString("fr-FR")+" à "+now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("sWait").classList.add("hidden");
  document.getElementById("sResult").classList.remove("hidden");
}
function reset(){
  document.getElementById("mi").value="";
  document.getElementById("sResult").classList.add("hidden");
  document.getElementById("sWait").classList.remove("hidden");
  history.pushState({},"",location.pathname);
}
</script>
</body>
</html>
