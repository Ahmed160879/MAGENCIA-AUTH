<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGENCIA — Ma carte</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#F5F6FA;min-height:100vh;display:flex;flex-direction:column}
.header{background:#1B2A4A;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:800;color:white}.logo span{color:#C9A84C}
#login{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
h1{font-size:24px;font-weight:800;color:#1B2A4A;margin-bottom:8px;text-align:center}
p{font-size:14px;color:#6B7A99;text-align:center;margin-bottom:28px;line-height:1.5}
.wrap{width:100%;max-width:320px}
input{width:100%;padding:16px;border:2px solid #E2E8F0;border-radius:12px;font-size:20px;font-weight:700;letter-spacing:3px;text-align:center;text-transform:uppercase;color:#1B2A4A;font-family:monospace;margin-bottom:12px}
input:focus{outline:none;border-color:#C9A84C}
button{width:100%;padding:16px;background:#1B2A4A;color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.err{background:#FEE2E2;color:#991B1B;border-radius:10px;padding:12px;font-size:13px;text-align:center;margin-top:10px;display:none}
.codes{margin-top:16px;font-size:12px;color:#6B7A99;text-align:center;line-height:1.8}
#carte{display:none;flex:1;flex-direction:column;padding:20px}
.card{background:#1B2A4A;border-radius:20px;padding:24px;color:white;margin-bottom:16px}
.badge{background:#C9A84C;color:white;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:16px}
.name{font-size:26px;font-weight:800;margin-bottom:4px}
.poste{font-size:14px;opacity:0.65;margin-bottom:4px}
.code{font-family:monospace;font-size:13px;opacity:0.5}
.qr{background:white;border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;margin-bottom:16px;box-shadow:0 4px 24px rgba(27,42,74,0.12)}
.qr-title{font-size:12px;font-weight:700;color:#6B7A99;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:16px}
.qr img{width:220px;height:220px;border-radius:8px}
.qr-note{margin-top:14px;font-size:13px;color:#6B7A99;text-align:center}
.chantiers{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 24px rgba(27,42,74,0.12)}
.ch-title{font-size:12px;font-weight:700;color:#6B7A99;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px}
.pill{display:inline-block;background:#EEF2FF;color:#1B2A4A;font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px;margin:3px}
.btn-out{width:100%;padding:14px;background:transparent;color:#6B7A99;border:1.5px solid #E2E8F0;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="header"><div class="logo">MAG<span>ENCIA</span></div><span style="font-size:12px;color:rgba(255,255,255,0.5)">Ma carte accès</span></div>
<div id="login">
  <div style="font-size:52px;margin-bottom:16px">🪪</div>
  <h1>Votre carte d'accès</h1>
  <p>Connectez-vous avec votre code unique<br>pour afficher votre QR code</p>
  <div class="wrap">
    <input id="code" type="text" placeholder="MAG-XXXXXX" maxlength="12" onkeydown="if(event.key==='Enter')go()">
    <button onclick="go()">Afficher ma carte →</button>
    <div class="err" id="err">❌ Code non reconnu</div>
    <div class="codes">Codes : <strong>MAG-384729</strong> · <strong>MAG-582341</strong> · <strong>EXT-114872</strong></div>
  </div>
</div>
<div id="carte">
  <div class="card">
    <div class="badge" id="badge">INTERNE</div>
    <div class="name" id="name">—</div>
    <div class="poste" id="poste">—</div>
    <div class="code" id="codeVal">—</div>
  </div>
  <div class="qr">
    <div class="qr-title">📱 QR Code à scanner chez le fournisseur</div>
    <img id="qrimg" src="" alt="QR Code">
    <div class="qr-note">Présentez ce QR code au fournisseur</div>
  </div>
  <div class="chantiers">
    <div class="ch-title">🏗️ Chantiers autorisés</div>
    <div id="ch"></div>
  </div>
  <button class="btn-out" onclick="out()">← Déconnexion</button>
</div>
<script>
var U=[
  {c:"MAG-384729",n:"EL MRABET Ahmed",p:"Gérant",t:"INTERNE",s:"ACTIF",ch:["NOZ Brioude","Patriarca","Carter Cash Angoulins","Stow Your Bags"]},
  {c:"MAG-582341",n:"DUPONT Vincent",p:"Chef de chantier",t:"INTERNE",s:"ACTIF",ch:["Carter Cash Angoulins","Stow Your Bags"]},
  {c:"EXT-114872",n:"MARTIN Paul",p:"Sous-traitant",t:"EXT",s:"ACTIF",ch:["Stow Your Bags"]},
  {c:"EXT-203541",n:"GARCIA Luis",p:"Sous-traitant",t:"EXT",s:"INACTIF",ch:[]}
];
function go(){
  var v=document.getElementById("code").value.trim().toUpperCase();
  var u=U.find(function(x){return x.c===v;});
  if(!u||u.s==="INACTIF"){document.getElementById("err").style.display="block";return;}
  document.getElementById("err").style.display="none";
  document.getElementById("badge").textContent=u.t==="INTERNE"?"INTERNE":"SOUS-TRAITANT";
  document.getElementById("name").textContent=u.n;
  document.getElementById("poste").textContent=u.p;
  document.getElementById("codeVal").textContent=u.c;
  document.getElementById("ch").innerHTML=u.ch.map(function(c){return'<span class="pill">🏗️ '+c+'</span>';}).join("");
  var d=encodeURIComponent("MAGENCIA|"+u.c+"|"+u.n+"|"+u.ch.join(","));
  document.getElementById("qrimg").src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data="+d;
  document.getElementById("login").style.display="none";
  document.getElementById("carte").style.display="flex";
  document.getElementById("carte").style.flexDirection="column";
}
function out(){
  document.getElementById("code").value="";
  document.getElementById("login").style.display="flex";
  document.getElementById("login").style.flexDirection="column";
  document.getElementById("carte").style.display="none";
}
</script>
</body>
</html>
