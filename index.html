<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MAGENCIA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#1B2A4A;--gold:#C9A84C;--bg:#F0F2F7;--white:#fff;--green:#10B981;--red:#EF4444;--muted:#8896B0}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.safe-top{height:env(safe-area-inset-top,44px);background:var(--navy)}
.hdr{background:var(--navy);padding:12px 20px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:900;color:#fff}.logo em{color:var(--gold);font-style:normal}
.hdr-sub{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.5px}
.screen{flex:1;display:flex;flex-direction:column}
.hidden{display:none!important}
#sLogin{align-items:center;justify-content:center;padding:32px 24px}
.login-visual{width:80px;height:80px;background:linear-gradient(135deg,var(--navy),#2d4a8a);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:24px;box-shadow:0 8px 32px rgba(27,42,74,0.25)}
.login-title{font-size:26px;font-weight:800;color:var(--navy);margin-bottom:8px;text-align:center;letter-spacing:-0.5px}
.login-sub{font-size:15px;color:var(--muted);text-align:center;margin-bottom:36px;line-height:1.5}
.field{width:100%;max-width:300px;margin-bottom:12px}
.field-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block}
.field-input{width:100%;padding:18px;border:2px solid #DDE3EF;border-radius:14px;font-size:22px;font-weight:700;letter-spacing:4px;text-align:center;text-transform:uppercase;color:var(--navy);font-family:monospace;background:var(--white);-webkit-appearance:none}
.field-input:focus{outline:none;border-color:var(--gold)}
.btn-main{width:100%;max-width:300px;padding:18px;background:var(--navy);color:white;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer}
.btn-main:active{opacity:0.85}
.err-msg{max-width:300px;background:#FEE2E2;color:#991B1B;border-radius:12px;padding:12px 16px;font-size:13px;text-align:center;margin-top:10px;display:none;font-weight:500}
.demo-hint{margin-top:20px;font-size:12px;color:var(--muted);text-align:center;line-height:2}
.demo-hint strong{color:var(--navy);font-weight:700}
#sCarte{padding:16px;overflow-y:auto;gap:14px}
.identity-card{background:linear-gradient(135deg,var(--navy),#243660);border-radius:22px;padding:22px;color:white;position:relative;overflow:hidden}
.identity-card::before{content:'';position:absolute;right:-20px;top:-20px;width:130px;height:130px;background:rgba(201,168,76,0.15);border-radius:50%}
.ic-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ic-badge{background:var(--gold);color:white;font-size:10px;font-weight:800;padding:5px 12px;border-radius:20px;letter-spacing:0.8px;text-transform:uppercase}
.ic-status{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.7)}
.status-dot{width:7px;height:7px;background:#34D399;border-radius:50%}
.ic-name{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.ic-poste{font-size:14px;opacity:0.6;margin-bottom:6px}
.ic-code{font-family:monospace;font-size:12px;opacity:0.4;letter-spacing:1.5px}
.qr-card{background:var(--white);border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;box-shadow:0 2px 16px rgba(27,42,74,0.10)}
.qr-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.qr-img{width:200px;height:200px;border-radius:12px}
.qr-note{margin-top:14px;font-size:13px;color:var(--muted);text-align:center;line-height:1.5;font-weight:500}
.chantiers-card{background:var(--white);border-radius:20px;padding:18px;box-shadow:0 2px 16px rgba(27,42,74,0.10)}
.ch-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.ch-pill{display:inline-flex;align-items:center;gap:6px;background:#EEF2FF;color:var(--navy);font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;margin:3px}
.btn-logout{width:100%;padding:15px;background:transparent;color:var(--muted);border:1.5px solid #DDE3EF;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="safe-top"></div>
<div class="hdr">
  <div class="logo">MAG<em>ENCIA</em></div>
  <div class="hdr-sub">Ma carte</div>
</div>
<div class="screen" id="sLogin">
  <div class="login-visual">🪪</div>
  <div class="login-title">Carte d'accès</div>
  <div class="login-sub">Entrez votre code pour afficher<br>votre QR code fournisseur</div>
  <div class="field">
    <label class="field-label">Code personnel</label>
    <input class="field-input" id="codeInput" type="text" placeholder="MAG-XXXXXX" maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn-main" onclick="login()">Afficher ma carte →</button>
  <div class="err-msg" id="errMsg">❌ Code non reconnu</div>
  <div class="demo-hint">Codes de test :<br><strong>MAG-384729</strong> · <strong>MAG-582341</strong> · <strong>EXT-114872</strong></div>
</div>
<div class="screen hidden" id="sCarte">
  <div class="identity-card">
    <div class="ic-top">
      <div class="ic-badge" id="icBadge">INTERNE</div>
      <div class="ic-status"><div class="status-dot"></div>ACTIF</div>
    </div>
    <div class="ic-name" id="icName">—</div>
    <div class="ic-poste" id="icPoste">—</div>
    <div class="ic-code" id="icCode">—</div>
  </div>
  <div class="qr-card">
    <div class="qr-label">📱 À scanner chez le fournisseur</div>
    <img class="qr-img" id="qrImg" src="" alt="QR Code">
    <div class="qr-note">Le fournisseur scanne ce QR<br>avec son appareil photo iPhone</div>
  </div>
  <div class="chantiers-card">
    <div class="ch-label">🏗️ Chantiers autorisés</div>
    <div id="chList"></div>
  </div>
  <button class="btn-logout" onclick="logout()">← Déconnexion</button>
</div>
<script>
var USERS=[
  {c:"MAG-384729",n:"EL MRABET Ahmed",p:"Gérant",t:"INTERNE",s:"ACTIF",ch:["NOZ Brioude","Patriarca","Carter Cash Angoulins","Stow Your Bags"]},
  {c:"MAG-582341",n:"DUPONT Vincent",p:"Chef de chantier",t:"INTERNE",s:"ACTIF",ch:["Carter Cash Angoulins","Stow Your Bags"]},
  {c:"EXT-114872",n:"MARTIN Paul",p:"Sous-traitant",t:"EXT",s:"ACTIF",ch:["Stow Your Bags"]},
  {c:"EXT-203541",n:"GARCIA Luis",p:"Sous-traitant",t:"EXT",s:"INACTIF",ch:[]}
];
var FOURNI_URL="https://ahmed160879.github.io/MAGENCIA-AUTH/fournisseur_1.html";
  function login(){
  var v=document.getElementById("codeInput").value.trim().toUpperCase();
  var u=USERS.find(function(x){return x.c===v;});
  var err=document.getElementById("errMsg");
  if(!u||u.s==="INACTIF"){err.style.display="block";return;}
  err.style.display="none";
  document.getElementById("icBadge").textContent=u.t==="INTERNE"?"INTERNE":"SOUS-TRAITANT";
  document.getElementById("icName").textContent=u.n;
  document.getElementById("icPoste").textContent=u.p;
  document.getElementById("icCode").textContent=u.c;
  document.getElementById("chList").innerHTML=u.ch.map(function(c){return'<span class="ch-pill">🏗️ '+c+'</span>';}).join("")||'<span style="color:var(--red);font-size:13px">Aucun chantier autorisé</span>';
  var url=FOURNI_URL+"?v="+encodeURIComponent(u.c);
  document.getElementById("qrImg").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=1B2A4A&bgcolor=ffffff&qzone=2&data="+encodeURIComponent(url);
  document.getElementById("sLogin").classList.add("hidden");
  document.getElementById("sCarte").classList.remove("hidden");
}
function logout(){
  document.getElementById("codeInput").value="";
  document.getElementById("sLogin").classList.remove("hidden");
  document.getElementById("sCarte").classList.add("hidden");
}
</script>
</body>
</html>
